<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/img/porsche_img1.png" />
    <meta name="description" content="Create a Porsche account to unlock full performance figures." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
    <title>Create account — Porsche</title>
    <script>
      try {
        var saved = localStorage.getItem("theme");
        document.documentElement.setAttribute("data-theme", saved === "light" ? "light" : "dark");
      } catch (e) {}
    </script>
  </head>
  <body class="grain">
    <div class="auth">
      <div class="auth-art">
        <img src="/img/img3.jpg" alt="" />
        <div class="veil"></div>
        <div class="quote">
          <a href="/"><img class="brand-logo" style="height:1.25rem" src="/img/porsche_white.png" alt="Porsche" /></a>
          <p>Engineered for magic. Every day.</p>
        </div>
      </div>

      <div class="auth-form">
        <div class="inner">
          <p class="eyebrow">Join Porsche</p>
          <h1>Create account</h1>
          <form class="form" id="signupForm" novalidate>
            <div class="field-row">
              <div class="field">
                <label for="name">Name</label>
                <input id="name" name="name" required />
                <p class="err" id="err-name"></p>
              </div>
              <div class="field">
                <label for="surname">Surname</label>
                <input id="surname" name="surname" required />
                <p class="err" id="err-surname"></p>
              </div>
            </div>
            <div class="field">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" autocomplete="email" required />
              <p class="err" id="err-email"></p>
            </div>
            <div class="field-row">
              <div class="field">
                <label for="phone">Phone</label>
                <input id="phone" name="phone" required />
                <p class="err" id="err-phone"></p>
              </div>
              <div class="field">
                <label for="birthdate">Birth date</label>
                <input id="birthdate" name="birthdate" type="date" min="1900-01-01" required />
                <p class="err" id="err-birthdate"></p>
              </div>
            </div>
            <div class="field">
              <label for="password">Password</label>
              <input id="password" name="password" type="password" autocomplete="new-password" placeholder="At least 8 characters" required />
              <p class="err" id="err-password"></p>
            </div>
            <div class="field">
              <label for="confirm">Confirm password</label>
              <input id="confirm" name="confirm" type="password" autocomplete="new-password" required />
              <p class="err" id="err-confirm"></p>
            </div>
            <p class="form-error" id="formError"></p>
            <button class="btn btn-light btn-block" id="submit" type="submit">Create account</button>
          </form>

          <p class="auth-alt">Already have an account? <a href="/login.html">Sign in</a></p>
        </div>
      </div>
    </div>
    <script type="module" src="/js/signup.js"></script>
  </body>
</html>

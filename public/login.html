<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/img/porsche_img1.png" />
    <meta name="description" content="Sign in to your Porsche account." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
    <title>Sign in — Porsche</title>
    <script>
      try {
        var saved = localStorage.getItem("theme");
        document.documentElement.setAttribute("data-theme", saved === "light" ? "light" : "dark");
      } catch (e) {}
    </script>
  </head>
  <body class="grain">
    <div class="auth">
      <div class="auth-art">
        <img src="/img/img3.jpg" alt="" />
        <div class="veil"></div>
        <div class="quote">
          <a href="/"><img class="brand-logo" style="height:1.25rem" src="/img/porsche_white.png" alt="Porsche" /></a>
          <p>Engineered for magic. Every day.</p>
        </div>
      </div>

      <div class="auth-form">
        <div class="inner">
          <p class="eyebrow">Welcome back</p>
          <h1>Sign in</h1>
          <form class="form" id="loginForm" novalidate>
            <div class="field">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" autocomplete="email" placeholder="you@example.com" required />
            </div>
            <div class="field">
              <label for="password">Password</label>
              <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
            </div>
            <p class="form-error" id="formError"></p>
            <button class="btn btn-light btn-block" id="submit" type="submit">Sign in</button>
          </form>

          <p class="demo-note">Demo account — <b>demo@porsche.dev</b> / <b>demo1234</b></p>
          <p class="auth-alt">New here? <a href="/signup.html">Create an account</a></p>
        </div>
      </div>
    </div>
    <script type="module" src="/js/login.js"></script>
  </body>
</html>
